<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moxa || Home || Akramjonov</title>
    <!-- FAVICON -->
    <link rel="shortcut icon" href="./images/png/site-favi.png" type="image/x-icon">
    <!-- STYLES CSS -->
    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="stylesheet" href="./fonts/fonts.css">
    <link rel="stylesheet" href="./css/main.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header__container">
            <a class="site-logo" href="#">
                <img class="site-logo-img" src="./images/svg/site-logo.svg" alt="Moxa" width="131" height="32">
            </a>
            <ul class="header__list">
                <!-- ITEM 1 -->
                <li class="header__item">
                    <a class="header__link" href="#">Home</a>
                </li>
                <!-- ITEM 2 -->
                <li class="header__item">
                    <a class="header__link" href="#">About</a>
                </li>
                <!-- ITEM 3 -->
                <li class="header__item">
                    <a class="header__link" href="#">Contact</a>
                </li>
            </ul>
            <a class="header__btn" href="#"><span>Let's talk</span></a>
            <script>
                const btn = document.querySelector('.header__btn');
                btn.onmousemove = function(e){
                    const x = e.pageX - btn.offsetLeft;
                    const y = e.pageY - btn.offsetTop;

                    btn.style.setProperty('--x', x + 'px');
                    btn.style.setProperty('--y', y + 'px');
                }
            </script>
            <a class="bars-btn" href="#">
                <img class="bars-btn-img" src="./images/png/bars-btn.png" alt="bars-btn" width="30" height="30">
            </a>
        </div>
    </header>
    <!-- HEADER END -->
    
    <!-- MAIN -->
    <main class="main">

        <!-- HERO -->
        <div class="hero">
            <div class="header__container">
                <div class="hero__wrapper">
                    <h1 class="hero__title">HI, I’M TAYLER. A CREATIVE 
                        <img src="./images/svg/site-vector.svg" alt="" width="40" height="40">
                        DESIGNER BASED IN LONDON
                    </h1>
                    <div class="hero__inner-wrapper">
                        <p class="hero__text">DESIGN</p>
                        <img class="hero__star" src="./images/svg/hero-star.svg" alt="hero-star" width="20" height="20">
                        <p class="hero__text">DEVELOPMENT</p>
                        <img class="hero__star" src="./images/svg/hero-star.svg" alt="hero-star" width="20" height="20">
                        <p class="hero__text">WEBFLOW</p>
                    </div>
                    <div class="hero__btn-wrapper">
                        <a class="hero__black-btn site-btn" href="#">Got a project?</a>
                        <a class="hero__white-btn site-btn" href="#">Let's talk.</a>
                    </div>
                </div>
                <div class="hero__img-wrapper">
                    <img class="hero__img" src="./images/png/hero-img.png" alt="qora odam">
                    <img class="hero__img-inner" src="./images/svg/site-vector.svg" alt="" >
                </div>
            </div>
        </div>
        <!-- HERO END -->
        
    </main>
    <!-- MAIN END -->
</body>
</html>
